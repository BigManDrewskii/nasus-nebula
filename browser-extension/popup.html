<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      padding: 16px;
      background: #0f0f0f;
      color: #e5e5e5;
      margin: 0;
    }
    .logo { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 12px; color: #888; margin-bottom: 16px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #1a1a1a;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
    .info-section {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; }
    .info-value { color: #e5e5e5; font-weight: 500; }
    .test-btn {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.12s;
    }
    .test-btn:hover { background: rgba(34, 197, 94, 0.25); }
    .test-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .test-btn.connected {
      background: rgba(34, 197, 94, 0.25);
    }
    .test-btn.error {
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
    }
    .footer {
      margin-top: 12px;
      font-size: 10px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">Nasus</div>
  <div class="sub">Browser Bridge v1.1.0</div>

  <div class="status">
    <div class="dot"></div>
    <span>Extension active</span>
  </div>

  <div class="info-section">
    <div class="info-row">
      <span class="info-label">Attached tabs</span>
      <span class="info-value" id="tabCount">0</span>
    </div>
    <div class="info-row">
      <span class="info-label">Available actions</span>
      <span class="info-value">10</span>
    </div>
  </div>

  <button class="test-btn" id="testBtn">Test Connection to App</button>

  <div class="footer">Nasus can control your browser when you grant permission in the app.</div>

  <script src="popup.js"></script>
</body>
</html>
