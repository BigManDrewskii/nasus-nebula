<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 260px;
      padding: 16px;
      background: #0f0f0f;
      color: #e5e5e5;
      margin: 0;
    }
    .logo { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 12px; color: #888; margin-bottom: 16px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #1a1a1a;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
    .footer { font-size: 11px; color: #555; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="logo">Nasus</div>
  <div class="sub">Browser Bridge</div>
  <div class="status">
    <div class="dot"></div>
    <span>Extension active &amp; ready</span>
  </div>
  <div class="footer">Nasus can control your browser when you grant permission in the app.</div>
</body>
</html>
