    <title>Nasus</title>
    <!--
      Content-Security-Policy:
      - default-src 'self': baseline; all unlisted resource types default to self-only
      - script-src 'self' 'unsafe-inline' 'unsafe-eval': needed for Vite HMR, Pyodide WebWorkers, and bundled inline scripts
      - connect-src *: the agent calls arbitrary APIs (LLM providers, search, http_fetch) — must be open
      - img-src 'self' data: blob: https:*: screenshots (data:), user uploads (blob:), remote images
      - worker-src 'self' blob:: Pyodide and other Web Workers
      - style-src 'self' 'unsafe-inline' fonts.googleapis.com: inline styles + Google Fonts CSS
      - font-src 'self' data: fonts.gstatic.com: local WOFF2 + Google Fonts binaries
    -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        connect-src *;
        img-src 'self' data: blob: https:;
        worker-src 'self' blob:;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' data: https://fonts.gstatic.com;
        frame-src 'none';
        object-src 'none';
      " />
    <script type="module" crossorigin src="/assets/index-CwlSkomJ.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BxrEi_5a.css">
